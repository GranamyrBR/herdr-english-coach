id = "granamyrbr.english-coach"
name = "English Coach"
version = "0.3.0"
min_herdr_version = "0.7.0"
description = "A teacher's notebook for non-native English speakers: your coding agent logs color-coded English corrections (grammar + dev jargon) to a live side pane while you work."
platforms = ["linux", "macos"]

[[actions]]
id = "open"
title = "Open English Coach board"
command = ["bash", "open.sh"]

[[actions]]
id = "add"
title = "Add a correction to the board"
command = ["bash", "add.sh"]

[[actions]]
id = "score"
title = "Show DevTOEFL scoreboard"
command = ["bash", "score.sh", "show"]

[[actions]]
id = "clear"
title = "Clear English Coach history"
command = ["bash", "clear.sh"]

[[panes]]
id = "board"
title = "English Coach"
placement = "split"
command = ["bash", "coach.sh"]
